.tab{flex:0 0 auto;background:var(--card);border:2px solid transparent;border-radius:12px;padding:8px 12px;text-align:center;cursor:pointer;min-width:64px;transition:all .15s;}
.tab .dow{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
.tab .dnum{font-size:1.05rem;font-weight:700;margin-top:2px;}
.tab .dcount{font-size:.65rem;color:var(--accent);margin-top:2px;}
.tab.active{border-color:var(--accent);background:#1a2740;}

.tab.today{position:relative;}
.tab.today::after{content:'';position:absolute;top:4px;right:4px;width:6px;height:6px;border-radius:50%;background:var(--gold);}
.alert-banner{background:#1f1820;border:1px solid var(--purple);border-radius:12px;padding:10px 14px;margin:12px 0;font-size:.86rem;color:var(--purple);display:flex;align-items:center;gap:8px;}
.progress-wrap{background:var(--card);border-radius:14px;padding:14px 16px;margin:14px 0 20px;}
.progress-bar{height:10px;background:#2c303a;border-radius:6px;overflow:hidden;margin-top:8px;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--done));width:0%;transition:width .35s ease;}
.progress-text{font-size:.88rem;color:var(--muted);display:flex;justify-content:space-between;}
.section-title{font-size:.82rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin:20px 4px 8px;}
.item{background:var(--card);border-radius:12px;padding:13px 14px;margin-bottom:10px;display:flex;align-items:flex-start;gap:12px;border-left:4px solid var(--accent);transition:transform .15s ease,opacity .25s ease;position:relative;overflow:hidden;cursor:pointer;}
.item:hover{background:#1e2230;}
.item:active{transform:scale(.985);}
.item.warn{border-left-color:var(--warn);}
.item.money{border-left-color:var(--gold);}
.item.purple{border-left-color:var(--purple);}
.item.teal{border-left-color:var(--teal);}

.checkbox{width:26px;height:26px;border-radius:50%;border:2px solid currentColor;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;background:transparent;color:var(--accent);z-index:2;position:relative;}
.item.warn .checkbox{color:var(--warn);}
.item.money .checkbox{color:var(--gold);}
.item.purple .checkbox{color:var(--purple);}
.item.teal .checkbox{color:var(--teal);}
.item.personal .checkbox{color:#ff8c69;}
.checkbox.checked{background:var(--done);border-color:var(--done);color:var(--done);}
.checkbox svg{width:14px;height:14px;opacity:0;transition:opacity .15s;}
.checkbox.checked svg{opacity:1;}
.item-body{flex:1;min-width:0;}
.item-time{font-size:.78rem;font-weight:700;letter-spacing:.5px;margin-bottom:2px;display:block;color:var(--accent);}
.item.warn .item-time{color:var(--warn);}
.item.money .item-time{color:var(--gold);}
.item.purple .item-time{color:var(--purple);}
.item.teal .item-time{color:var(--teal);}
.item.personal .item-time{color:#ff8c69;}

.item-desc{font-size:.83rem;color:var(--muted);margin-top:3px;line-height:1.4;}
.badge{display:inline-block;font-size:.68rem;font-weight:700;padding:2px 7px;border-radius:20px;margin-top:5px;text-transform:uppercase;letter-spacing:.5px;}
.badge-eng{background:#1f2018;color:var(--gold);}
.badge-tfd{background:#1a1a2e;color:var(--purple);}
.badge-anz{background:#142420;color:var(--teal);}

.done-toggle{text-align:center;margin:22px 0 6px;color:var(--muted);font-size:.84rem;cursor:pointer;text-decoration:underline;}
.doneList{display:none;opacity:.55;}
.empty-msg{text-align:center;color:var(--muted);padding:28px;font-size:1rem;display:none;}
.reset-btn{display:block;width:100%;margin-top:22px;padding:11px;background:var(--card2);border:none;border-radius:12px;color:var(--muted);font-size:.84rem;cursor:pointer;}
.day-panel{display:none;}
.day-panel.active{display:block;}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s ease;}

// 2. SYNC STORAGE (GitHub backend)
// ════════════════════════════════════════════════════════════
// ── SYNC STORAGE (GitHub como backend) ──────────────────────────────────────
const GITHUB_TOKEN = ["ghp_HzX6h6U7","vppPImq8AW3P","EWgeBNm3kc31pIzI"].join("");
const REPO = "hersonvalmont/agenda";
const CHECKS_FILE = "checks.json";
let _checks = {}; // cache local
let _checksSha = null;
let _syncing = false;
let _dirty = false;

async function loadChecks() {
  try {
    const r = await fetch(`https://api.github.com/repos/${REPO}/contents/${CHECKS_FILE}`, {
      headers: { Authorization: `token ${GITHUB_TOKEN}`, Accept: "application/vnd.github.v3+json" }
    });
    if (r.ok) {
      const d = await r.json();
      _checksSha = d.sha;
      _checks = JSON.parse(atob(d.content.replace(/\n/g,"")));
    } else if (r.status === 404) {
      _checks = {};
      _checksSha = null;
    }
  } catch(e) {
    // offline — usa localStorage como fallback
    try { _checks = JSON.parse(localStorage.getItem("agenda_checks")||"{}"); } catch(e2){}
  }
  // sync localStorage também
  try { localStorage.setItem("agenda_checks", JSON.stringify(_checks)); } catch(e){}
}

async function saveChecks() {
  if (_syncing) { _dirty = true; return; }
  _syncing = true;
  try {
    const body = { message: "update checks", content: btoa(unescape(encodeURIComponent(JSON.stringify(_checks)))) };
    if (_checksSha) body.sha = _checksSha;
    const r = await fetch(`https://api.github.com/repos/${REPO}/contents/${CHECKS_FILE}`, {
      method: "PUT",
      headers: { Authorization: `token ${GITHUB_TOKEN}`, Accept: "application/vnd.github.v3+json", "Content-Type": "application/json" },
      body: JSON.stringify(body)
    });
    if (r.ok) {
      const d = await r.json();
      _checksSha = d.content.sha;
    }
    // sync localStorage
    try { localStorage.setItem("agenda_checks", JSON.stringify(_checks)); } catch(e){}
  } catch(e) {
    // offline — só salva localStorage
    try { localStorage.setItem("agenda_checks", JSON.stringify(_checks)); } catch(e2){}
  }
  _syncing = false;
  if (_dirty) { _dirty = false; saveChecks(); }
}

function ckey(date,id){return`${date}__${id}`;}
function isChecked(date,id){return !!_checks[ckey(date,id)];}
function setChecked(date,id,v){
  if(v) _checks[ckey(date,id)]=1;
  else delete _checks[ckey(date,id)];
  saveChecks();
}

const modalOverlay = document.getElementById("modalOverlay");
const modalClose   = document.getElementById("modalClose");

function openModal(it) {
  document.getElementById("modalBadge").textContent = it.bl || "";
  document.getElementById("modalBadge").className   = "modal-badge " + (it.badge || "");
  document.getElementById("modalTime").textContent  = it.time ? "🕐 " + it.time : "📌 Dia todo";
  document.getElementById("modalTitle").textContent = it.title;
  document.getElementById("modalDesc").textContent  = it.desc || "";
  const btn = document.getElementById("modalBtn");
  btn.href = it.url || "#";
  btn.style.display = it.url ? "flex" : "none";
  modalOverlay.classList.add("open");
}

modalClose.onclick = () => modalOverlay.classList.remove("open");
modalOverlay.addEventListener("click", e => { if(e.target === modalOverlay) modalOverlay.classList.remove("open"); });
let _ty0 = 0;
modalOverlay.addEventListener("touchstart", e => { _ty0 = e.touches[0].clientY; }, {passive:true});
modalOverlay.addEventListener("touchend",   e => { if(e.changedTouches[0].clientY - _ty0 > 60) modalOverlay.classList.remove("open"); }, {passive:true});

const doneListOpenState = {};

function checkSVG(){return`<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;}

function hardReload(){
  if("caches" in window){
    caches.keys().then(keys=>Promise.all(keys.map(k=>caches.delete(k)))).then(()=>window.location.reload(true));
  } else { window.location.reload(true); }
}

// 5. RENDER
// ════════════════════════════════════════════════════════════
function buildItem(it, date) {
  const done = isChecked(date, it.id);
  const el = document.createElement("div");
  el.className = "item" + (it.cls ? " " + it.cls : "");
  el.innerHTML = `
    <div class="checkbox ${done ? "checked" : ""}" data-id="${it.id}">${checkSVG()}</div>
    <div class="item-body">
      ${it.time ? `<span class="item-time">${it.time}</span>` : ""}
      <div class="item-title">${it.title}</div>
      ${it.desc ? `<div class="item-desc">${it.desc}</div>` : ""}
      <span class="badge ${it.badge}">${it.bl}</span>
    </div>`;

  // Checkbox: marca/desmarca
  el.querySelector(".checkbox").addEventListener("click", e => {
    e.stopPropagation();
    const inDone = document.getElementById("panel_" + DAYS.find(d=>d.date===date).key).querySelector(".doneList").contains(el);
    if(inDone){ setChecked(date, it.id, false); }
    else { el.classList.add("fade-out"); setChecked(date, it.id, true); }
    setTimeout(() => renderDay(DAYS.find(d => d.date === date)), 270);
  });

  // Card: abre modal
  el.addEventListener("click", e => {
    if(e.target.closest(".checkbox")) return;
    openModal(it);
  });

  return { el, done };
}

function renderDay(day) {
  const timed  = day.items.filter(i => i.time);
  const allday = day.items.filter(i => !i.time);
  const panel     = document.getElementById("panel_" + day.key);
  const timedList = panel.querySelector(".timedList");
  const alldayList= panel.querySelector(".allDayList");
  const doneList  = panel.querySelector(".doneList");
  timedList.innerHTML = ""; alldayList.innerHTML = ""; doneList.innerHTML = "";
  let doneCount = 0;

  function place(it, target) {
    const { el, done } = buildItem(it, day.date);
    if(done) { doneCount++; doneList.appendChild(el); }
    else { target.appendChild(el); }
  }
  timed.forEach(it => place(it, timedList));
  allday.forEach(it => place(it, alldayList));

  const total = day.items.length;
  const pct = total ? Math.round((doneCount / total) * 100) : 0;
  panel.querySelector(".progFill").style.width = pct + "%";
  panel.querySelector(".progLabel").textContent = `${doneCount} de ${total} concluídos`;
  panel.querySelector(".progPct").textContent = pct + "%";
  panel.querySelector(".emptyMsg").style.display = (total > 0 && doneCount === total) ? "block" : "none";

  const isOpen = !!doneListOpenState[day.key];
  doneList.style.display = isOpen ? "block" : "none";
  panel.querySelector(".doneToggle").textContent = isOpen ? "Ocultar concluídos ▴" : "Mostrar concluídos ▾";

  const tab = document.querySelector(`.tab[data-key="${day.key}"] .dcount`);
  if(tab) tab.textContent = `${doneCount}/${total}`;

  panel.querySelector(".doneToggle").onclick = () => {
    doneListOpenState[day.key] = !doneListOpenState[day.key];
    doneList.style.display = doneListOpenState[day.key] ? "block" : "none";
    panel.querySelector(".doneToggle").textContent = doneListOpenState[day.key] ? "Ocultar concluídos ▴" : "Mostrar concluídos ▾";
  };

  panel.querySelector(".resetBtn").onclick = () => {
    if(confirm(`Resetar checks de ${day.dow} ${day.dnum}/06?`)) {
      day.items.forEach(it => setChecked(day.date, it.id, false));
      renderDay(day);
    }
  };
}

// 6. INIT
// ════════════════════════════════════════════════════════════
function detectTodayKey() {
  const now = new Date();
  const s = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}-${String(now.getDate()).padStart(2,"0")}`;
  const m = DAYS.find(d => d.date === s);
  return m ? m.key : DAYS[0].key;
}
const TODAY_KEY = detectTodayKey();

function buildTabs() {
  const tabsEl = document.getElementById("tabs");
  DAYS.forEach(day => {
    const done = day.items.filter(it => isChecked(day.date, it.id)).length;
    const tab = document.createElement("div");
    tab.className = "tab" + (day.key === TODAY_KEY ? " today" : "");
    tab.dataset.key = day.key;
    tab.innerHTML = `<div class="dow">${day.dow}</div><div class="dnum">${day.dnum}</div><div class="dcount">${done}/${day.items.length}</div>`;
    tab.onclick = () => switchDay(day.key);
    tabsEl.appendChild(tab);
  });
}

function buildPanels() {
  const root = document.getElementById("panelsRoot");
  DAYS.forEach(day => {
    const panel = document.createElement("div");
    panel.className = "day-panel"; panel.id = "panel_" + day.key;
    panel.innerHTML = `
      ${day.banner ? `<div class="alert-banner">${day.banner}</div>` : ""}
      <div class="progress-wrap">
        <div class="progress-text"><span class="progLabel">0/0</span><span class="progPct">0%</span></div>
        <div class="progress-bar"><div class="progress-fill progFill"></div></div>
      </div>
      <div class="section-title">⏰ Com Horário</div>
      <div class="timedList"></div>
      <div class="section-title">📌 Do Dia (sem horário fixo)</div>
      <div class="allDayList"></div>
      <div class="empty-msg emptyMsg">🎉 Dia zerado!</div>
      <div class="done-toggle doneToggle">Mostrar concluídos ▾</div>
      <div class="doneList"></div>
      <button class="reset-btn resetBtn">↺ Resetar checklist do dia</button>`;
    root.appendChild(panel);
  });
}

function switchDay(key) {
  document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.dataset.key === key));
  document.querySelectorAll(".day-panel").forEach(p => p.classList.toggle("active", p.id === "panel_" + key));
  renderDay(DAYS.find(d => d.key === key));
}

// Carrega checks da nuvem antes de renderizar
document.getElementById("panelsRoot").innerHTML = '<div style="text-align:center;color:#8a90a0;padding:60px 20px;font-size:.95rem;">⏳ Sincronizando...</div>';
loadChecks().then(() => {
  document.getElementById("panelsRoot").innerHTML = "";
  buildTabs();
  buildPanels();
  DAYS.forEach(renderDay);
  switchDay(TODAY_KEY);
});
</script>
</body>
