sc}</div>`:""}${it.badge?`<span class="badge ${it.badge}">${it.badgeLabel}</span>`:""}</div>`;return{el,isDone}}function renderDay(day){const doneIds=JSON.parse(localStorage.getItem(storageKey(day.key))||'[]');const timed=day.items.filter(i=>i.time);const allday=day.items.filter(i=>!i.time);const panel=document.getElementById('panel_'+day.key);const timedList=panel.querySelector('.timedList');const alldayList=panel.querySelector('.allDayList');const doneList=panel.querySelector('.doneList');timedList.innerHTML='';alldayList.innerHTML='';doneList.innerHTML='';let doneCount=0;function place(it,target){const{el,isDone}=buildItem(it,doneIds);if(isDone){doneCount++;doneList.appendChild(el)}else target.appendChild(el)}timed.forEach(it=>place(it,timedList));allday.forEach(it=>place(it,alldayList));const total=day.items.length;const pct=total?Math.round(doneCount/total*100):0;panel.querySelector('.progFill').style.width=pct+'%';panel.querySelector('.progLabel').textContent=`${doneCount} de ${total} concluídos`;panel.querySelector('.progPct').textContent=pct+'%';panel.querySelector('.emptyMsg').style.display=total>0&&doneCount===total?'block':'none';const isOpen=!!doneListOpenState[day.key];doneList.style.display=isOpen?'block':'none';panel.querySelector('.doneToggle').textContent=isOpen?'Ocultar concluídos ▴':'Mostrar concluídos ▾';const tab=document.querySelector(`.tab[data-key="${day.key}"] .dcount`);if(tab)tab.textContent=`${doneCount}/${total}`;panel.querySelectorAll('.checkbox').forEach(cb=>{cb.onclick=()=>{const id=cb.dataset.id;const itemEl=cb.closest('.item');const inDone=doneList.contains(itemEl);let ids=JSON.parse(localStorage.getItem(storageKey(day.key))||'[]');if(inDone){ids=ids.filter(d=>d!==id);localStorage.setItem(storageKey(day.key),JSON.stringify(ids));renderDay(day)}else{itemEl.classList.add('fade-out');if(!ids.includes(id))ids.push(id);localStorage.setItem(storageKey(day.key),JSON.stringify(ids));setTimeout(()=>renderDay(day),270)}}});panel.querySelector('.doneToggle').onclick=()=>{doneListOpenState[day.key]=!doneListOpenState[day.key];renderDay(day)};panel.querySelector('.resetBtn').onclick=()=>{if(confirm(`Resetar todos os checks de ${day.dow} ${day.dnum}?`)){localStorage.setItem(storageKey(day.key),JSON.stringify([]));renderDay(day)}}}function buildTabs(){const tabsEl=document.getElementById('tabs');DAYS.forEach(day=>{const doneIds=JSON.parse(localStorage.getItem(storageKey(day.key))||'[]');const total=day.items.length;const doneCount=doneIds.length;const tab=document.createElement('div');tab.className='tab'+(day.key===TODAY_KEY?' today':'');tab.dataset.key=day.key;tab.innerHTML=`<div class="dow">${day.dow}</div><div class="dnum">${day.dnum}</div><div class="dcount">${doneCount}/${total}</div>`;tab.onclick=()=>switchDay(day.key);tabsEl.appendChild(tab)})}function buildPanels(){const root=document.getElementById('panelsRoot');DAYS.forEach(day=>{const panel=document.createElement('div');panel.className='day-panel';panel.id='panel_'+day.key;panel.innerHTML=`${day.banner?`<div class="alert-banner">${day.banner}</div>`:""}<div class="progress-wrap"><div class="progress-text"><span class="progLabel">0 de 0 concluídos</span><span class="progPct">0%</span></div><div class="progress-bar"><div class="progress-fill progFill"></div></div></div><div class="section-title">⏰ Com horário</div><div class="timeline timedList"></div><div class="section-title">📌 Do dia / sem horário fixo</div><div class="allDayList"></div><div class="empty-msg emptyMsg">🎉 Dia zerado!</div><div class="done-toggle doneToggle">Mostrar concluídos ▾</div><div class="doneList"></div><button class="reset-btn resetBtn">↺ Resetar checklist do dia</button>`;root.appendChild(panel)})}function switchDay(key){document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.key===key));document.querySelectorAll('.day-panel').forEach(p=>p.classList.toggle('active',p.id==='panel_'+key));const day=DAYS.find(d=>d.key===key);renderDay(day)}buildTabs();buildPanels();DAYS.forEach(renderDay);switchDay(TODAY_KEY);</script></body></html>
