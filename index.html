// ── SYNC (GitHub como backend) ──────────────────────────────
const GITHUB_TOKEN = ["ghp_HzX6h6U7","vppPImq8AW3P","EWgeBNm3kc31pIzI"].join("");
const REPO = "hersonvalmont/agenda";
const CHECKS_FILE = "checks.json";
let _checks = {}, _checksSha = null, _syncing = false, _dirty = false;

async function loadChecks() {
  try {
    const r = await fetch(`https://api.github.com/repos/${REPO}/contents/${CHECKS_FILE}`, {
      headers: { Authorization: `token ${GITHUB_TOKEN}`, Accept: "application/vnd.github.v3+json" }
    });
    if (r.ok) {
      const d = await r.json();
      _checksSha = d.sha;
      _checks = JSON.parse(atob(d.content.replace(/\n/g, "")));
    } else { _checks = {}; }
  } catch(e) {
    try { _checks = JSON.parse(localStorage.getItem("agenda_checks") || "{}"); } catch(e2) { _checks = {}; }
  }
  try { localStorage.setItem("agenda_checks", JSON.stringify(_checks)); } catch(e) {}
}

async function saveChecks() {
  if (_syncing) { _dirty = true; return; }
  _syncing = true;
  try {
    const body = { message: "sync checks", content: btoa(unescape(encodeURIComponent(JSON.stringify(_checks)))) };
    if (_checksSha) body.sha = _checksSha;
    const r = await fetch(`https://api.github.com/repos/${REPO}/contents/${CHECKS_FILE}`, {
      method: "PUT",
      headers: { Authorization: `token ${GITHUB_TOKEN}`, Accept: "application/vnd.github.v3+json", "Content-Type": "application/json" },
      body: JSON.stringify(body)
    });
    if (r.ok) { const d = await r.json(); _checksSha = d.content.sha; }
    try { localStorage.setItem("agenda_checks", JSON.stringify(_checks)); } catch(e) {}
  } catch(e) {
    try { localStorage.setItem("agenda_checks", JSON.stringify(_checks)); } catch(e2) {}
  }
  _syncing = false;
  if (_dirty) { _dirty = false; saveChecks(); }
}

function ckey(date, id) { return `${date}__${id}`; }
function isChecked(date, id) { return !!_checks[ckey(date, id)]; }
function setChecked(date, id, v) {
  if (v) _checks[ckey(date, id)] = 1; else delete _checks[ckey(date, id)];
  saveChecks();
}

const modalOverlay = document.getElementById("modalOverlay");
const modalClose   = document.getElementById("modalClose");

function openModal(it) {
  document.getElementById("modalBadge").textContent = it.bl || "";
  document.getElementById("modalBadge").className   = "modal-badge " + (it.badge || "");
  const timeEl = document.getElementById("modalTime");
  const dayEl  = document.getElementById("modalTimeDay");
  const dateEl = document.getElementById("modalDate");
  const day = DAYS.find(d => d.items.some(i => i.id === it.id));
  const dateStr = day ? day.date : "";
  const dateObj = dateStr ? new Date(dateStr + "T12:00:00") : null;
  const dowNames = ["Domingo","Segunda","Terça","Quarta","Quinta","Sexta","Sábado"];
  const monthNames = ["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];
  if (it.time) {
    timeEl.textContent = it.time; timeEl.className = "modal-time";
  } else {
    timeEl.textContent = "Dia todo"; timeEl.className = "modal-time allday";
  }
  dayEl.textContent  = dateObj ? dowNames[dateObj.getDay()] : "";
  dateEl.textContent = dateObj ? `${dateObj.getDate()} de ${monthNames[dateObj.getMonth()]} de ${dateObj.getFullYear()}` : "";
  document.getElementById("modalTitle").textContent = it.title;
  document.getElementById("modalDesc").textContent  = it.desc || "";
  const btn = document.getElementById("modalBtn");
  btn.href = it.url || "#";
  btn.style.display = it.url ? "flex" : "none";
  modalOverlay.classList.add("open");
}

modalClose.onclick = () => modalOverlay.classList.remove("open");
modalOverlay.addEventListener("click", e => { if (e.target === modalOverlay) modalOverlay.classList.remove("open"); });

// ── HELPERS ────────────────────────────────────────────────
const doneListOpenState = {};
function checkSVG() { return `<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`; }
function hardReload() { if ("caches" in window) { caches.keys().then(k => Promise.all(k.map(c => caches.delete(c)))).then(() => window.location.reload(true)); } else { window.location.reload(true); } }

// ── RENDER ─────────────────────────────────────────────────
function buildItem(it, date) {
  const done = isChecked(date, it.id);
  const el = document.createElement("div");
  el.className = "item" + (it.cls ? " " + it.cls : "");
  el.innerHTML = `<div class="checkbox ${done ? "checked" : ""}" data-id="${it.id}">${checkSVG()}</div><div class="item-body">${it.time ? `<span class="item-time">${it.time}</span>` : ""}<div class="item-title">${it.title}</div>${it.desc ? `<div class="item-desc">${it.desc}</div>` : ""}<span class="badge ${it.badge}">${it.bl}</span></div>`;
  el.querySelector(".checkbox").addEventListener("click", e => {
    e.stopPropagation();
    const inDone = document.getElementById("panel_" + DAYS.find(d => d.date === date).key).querySelector(".doneList").contains(el);
    if (inDone) { setChecked(date, it.id, false); }
    else { el.classList.add("fade-out"); setChecked(date, it.id, true); }
    setTimeout(() => renderDay(DAYS.find(d => d.date === date)), 270);
  });
  el.addEventListener("click", e => { if (e.target.closest(".checkbox")) return; openModal(it); });
  return { el, done };
}

function renderDay(day) {
  const timed = day.items.filter(i => i.time);
  const allday = day.items.filter(i => !i.time);
  const panel = document.getElementById("panel_" + day.key);
  const timedList = panel.querySelector(".timedList");
  const alldayList = panel.querySelector(".allDayList");
  const doneList = panel.querySelector(".doneList");
  timedList.innerHTML = ""; alldayList.innerHTML = ""; doneList.innerHTML = "";
  let doneCount = 0;
  function place(it, target) {
    const { el, done } = buildItem(it, day.date);
    if (done) { doneCount++; doneList.appendChild(el); } else { target.appendChild(el); }
  }
  timed.forEach(it => place(it, timedList));
  allday.forEach(it => place(it, alldayList));
  const total = day.items.length;
  const pct = total ? Math.round((doneCount / total) * 100) : 0;
  panel.querySelector(".progFill").style.width = pct + "%";
  panel.querySelector(".progLabel").textContent = `${doneCount} de ${total} concluídos`;
  panel.querySelector(".progPct").textContent = pct + "%";
  panel.querySelector(".emptyMsg").style.display = (total > 0 && doneCount === total) ? "block" : "none";
  const isOpen = !!doneListOpenState[day.key];
  doneList.style.display = isOpen ? "block" : "none";
  panel.querySelector(".doneToggle").textContent = isOpen ? "Ocultar concluídos ▴" : "Mostrar concluídos ▾";
  const tab = document.querySelector(`.tab[data-key="${day.key}"] .dcount`);
  if (tab) tab.textContent = `${doneCount}/${total}`;
  panel.querySelector(".doneToggle").onclick = () => {
    doneListOpenState[day.key] = !doneListOpenState[day.key];
    doneList.style.display = doneListOpenState[day.key] ? "block" : "none";
    panel.querySelector(".doneToggle").textContent = doneListOpenState[day.key] ? "Ocultar concluídos ▴" : "Mostrar concluídos ▾";
  };
  panel.querySelector(".resetBtn").onclick = () => {
    if (confirm(`Resetar checks de ${day.dow} ${day.dnum}?`)) {
      day.items.forEach(it => setChecked(day.date, it.id, false));
      renderDay(day);
    }
  };
}

// ── INIT ───────────────────────────────────────────────────
function detectTodayKey() {
  const now = new Date();
  const s = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}-${String(now.getDate()).padStart(2,"0")}`;
  const m = DAYS.find(d => d.date === s);
  return m ? m.key : DAYS[0].key;
}
const TODAY_KEY = detectTodayKey();

function buildTabs() {
  const tabsEl = document.getElementById("tabs");
  DAYS.forEach(day => {
    const done = day.items.filter(it => isChecked(day.date, it.id)).length;
    const tab = document.createElement("div");
    tab.className = "tab" + (day.key === TODAY_KEY ? " today" : "");
    tab.dataset.key = day.key;
    tab.innerHTML = `<div class="dow">${day.dow.substring(0,3).toUpperCase()}</div><div class="dnum">${day.dnum}</div><div class="dcount">${done}/${day.items.length}</div>`;
    tab.onclick = () => switchDay(day.key);
    tabsEl.appendChild(tab);
  });
}

function buildPanels() {
  const root = document.getElementById("panelsRoot");
  DAYS.forEach(day => {
    const panel = document.createElement("div");
    panel.className = "day-panel"; panel.id = "panel_" + day.key;
    panel.innerHTML = `${day.banner ? `<div class="alert-banner">${day.banner}</div>` : ""}<div class="progress-wrap"><div class="progress-text"><span class="progLabel">0/0</span><span class="progPct">0%</span></div><div class="progress-bar"><div class="progress-fill progFill"></div></div></div><div class="section-title">⏰ Com Horário</div><div class="timedList"></div><div class="section-title">📌 Do Dia (sem horário fixo)</div><div class="allDayList"></div><div class="empty-msg emptyMsg">🎉 Dia zerado!</div><div class="done-toggle doneToggle">Mostrar concluídos ▾</div><div class="doneList"></div><button class="reset-btn resetBtn">↺ Resetar checklist do dia</button>`;
    root.appendChild(panel);
  });
}

function switchDay(key) {
  document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.dataset.key === key));
  document.querySelectorAll(".day-panel").forEach(p => p.classList.toggle("active", p.id === "panel_" + key));
  renderDay(DAYS.find(d => d.key === key));
}

document.getElementById("panelsRoot").innerHTML = '<div style="text-align:center;color:#8a90a0;padding:60px 20px;font-size:.95rem;">⏳ Sincronizando...</div>';
loadChecks().then(() => {
  document.getElementById("panelsRoot").innerHTML = "";
  buildTabs(); buildPanels(); DAYS.forEach(renderDay); switchDay(TODAY_KEY);
});
</script>
</body>
